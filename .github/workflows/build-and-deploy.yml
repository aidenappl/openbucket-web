name: Build and Deploy to Registry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Inject Keyring secrets
        id: keyring
        uses: aidenappl/keyring-actions@v1
        with:
          url: ${{ secrets.KEYRING_URL }}
          access-key-id: ${{ secrets.KEYRING_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.KEYRING_SECRET_ACCESS_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Login to Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.REGISTRY_URL }}/${{ github.event.repository.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.keyring.outputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update deployment status
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deployment completed successfully!"
          echo "Image pushed to: ${{ env.REGISTRY_URL }}/${{ github.event.repository.name }}:latest"
          echo "Ready for Portainer deployment!"
